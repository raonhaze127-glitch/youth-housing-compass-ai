name: Daily announcement sync

on:
  schedule:
    # GitHub Actions cron uses UTC. 22:00 UTC is 07:00 KST the next day.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Run a 90-day reconciliation"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-announcement-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/announcement-api/requirements.txt

      - name: Install collector dependencies
        run: pip install -r services/announcement-api/requirements.txt

      - name: Choose sync window
        id: window
        shell: bash
        run: |
          if [[ "${{ inputs.full }}" == "true" || "$(date -u +%u)" == "6" ]]; then
            echo 'days_back=90' >> "$GITHUB_OUTPUT"
          else
            echo 'days_back=7' >> "$GITHUB_OUTPUT"
          fi

      - name: Collect and validate public housing snapshot
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          ANNOUNCEMENT_SYNC_TOKEN: ${{ secrets.ANNOUNCEMENT_SYNC_TOKEN }}
          ANNOUNCEMENT_API_BASE_URL: https://youth-housing-compass-announcement-api.onrender.com
        run: >-
          python services/announcement-api/scripts/export_snapshot.py
          --days-back "${{ steps.window.outputs.days_back }}"
          --minimum-count 3
          --enrich-limit 12

      - name: Sync snapshot to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "NOTION_TOKEN is not set. Skipping Notion sync."
            exit 0
          fi
          python services/announcement-api/scripts/sync_notion.py

      - name: Commit updated snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/live_housing_programs.json
          if git diff --cached --quiet; then
            echo "Snapshot is unchanged."
            exit 0
          fi
          git commit -m "Update public housing snapshot"
          git pull --rebase origin main
          git push origin HEAD:main
