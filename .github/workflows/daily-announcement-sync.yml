name: Daily announcement sync

on:
  schedule:
    # GitHub Actions cron uses UTC. 22:00 UTC is 07:00 KST the next day.
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      full:
        description: "Run a 90-day reconciliation"
        required: false
        default: false
        type: boolean

concurrency:
  group: daily-announcement-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Choose sync window
        id: window
        shell: bash
        run: |
          if [[ "${{ inputs.full }}" == "true" || "$(date -u +%u)" == "6" ]]; then
            echo 'payload={"full":true}' >> "$GITHUB_OUTPUT"
          else
            echo 'payload={"days_back":7}' >> "$GITHUB_OUTPUT"
          fi

      - name: Wake service and sync announcements
        shell: bash
        run: |
          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Sync-Token: ${{ secrets.ANNOUNCEMENT_SYNC_TOKEN }}" \
            --data '${{ steps.window.outputs.payload }}' \
            https://youth-housing-compass-announcement-api.onrender.com/v1/announcements/sync
