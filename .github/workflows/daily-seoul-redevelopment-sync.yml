name: Daily Seoul redevelopment sync

on:
  schedule:
    # GitHub Actions cron uses UTC. 17:00 UTC is 02:00 KST the next day.
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      max_items:
        description: "Maximum Notion rows to sync; 0 means all"
        required: false
        default: "0"

concurrency:
  group: daily-seoul-redevelopment-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/announcement-api/requirements.txt

      - name: Install collector dependencies
        run: pip install -r services/announcement-api/requirements.txt

      - name: Collect Seoul redevelopment supply candidates and sync Notion
        env:
          SEOUL_OPEN_API_KEY: ${{ secrets.SEOUL_OPEN_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_REDEVELOPMENT_DATABASE_ID: ${{ vars.NOTION_REDEVELOPMENT_DATABASE_ID }}
        run: >-
          python services/announcement-api/scripts/sync_seoul_redevelopment.py
          --max-items "${{ inputs.max_items || '0' }}"
          --timeout 20

      - name: Commit updated redevelopment snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seoul_redevelopment_progress.json
          if git diff --cached --quiet; then
            echo "Seoul redevelopment snapshot is unchanged."
            exit 0
          fi
          git commit -m "Update Seoul redevelopment snapshot"
          git pull --rebase origin main
          git push origin HEAD:main
